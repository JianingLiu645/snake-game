<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  .container {
    text-align: center;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .score-box {
    color: #e94560;
    font-size: 20px;
    font-weight: bold;
  }
  .score-box span {
    color: #f0f0f0;
    font-size: 28px;
  }
  .best-box {
    color: #533483;
    font-size: 16px;
  }
  .best-box span {
    color: #f0f0f0;
    font-size: 20px;
  }
  canvas {
    border: 2px solid #16213e;
    border-radius: 8px;
    background: #0f0f23;
    display: block;
  }
  .game-over {
    color: #e94560;
    font-size: 24px;
    margin-top: 12px;
    font-weight: bold;
    display: none;
  }
  .controls {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap: 6px;
    justify-content: center;
  }
  .controls button {
    background: #16213e;
    border: 1px solid #533483;
    color: #f0f0f0;
    font-size: 24px;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .controls button:active {
    background: #533483;
  }
  .btn-up    { grid-column: 2; grid-row: 1; }
  .btn-left  { grid-column: 1; grid-row: 2; }
  .btn-right { grid-column: 3; grid-row: 2; }
  .btn-down  { grid-column: 2; grid-row: 3; }
  .btn-reset {
    margin-top: 12px;
    background: #e94560;
    color: #fff;
    border: none;
    padding: 10px 32px;
    font-size: 16px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-reset:active { background: #c23152; }
  @media (min-width: 768px) {
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="score-box">分数 <span id="score">0</span></div>
    <div class="best-box">最高 <span id="best">0</span></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="game-over" id="gameOver">游戏结束！</div>
  <div class="controls" id="controls">
    <button class="btn-up">▲</button>
    <button class="btn-left">◀</button>
    <button class="btn-right">▶</button>
    <button class="btn-down">▼</button>
  </div>
  <button class="btn-reset" id="btnReset">重新开始</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const gameOverEl = document.getElementById('gameOver');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, food, dir, nextDir, score, best, gameLoop, running;
let particles = [];

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  running = true;
  particles = [];
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  scoreEl.textContent = '0';
  bestEl.textContent = best;
  gameOverEl.style.display = 'none';
  spawnFood();
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const free = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
    }
  }
  food = free[Math.floor(Math.random() * free.length)];
}

function update() {
  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnParticles(head.x * GRID + GRID / 2, head.y * GRID + GRID / 2);
    spawnFood();
  } else {
    snake.pop();
  }
}

function spawnParticles(cx, cy) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * 3,
      vy: Math.sin(angle) * 3,
      life: 1,
      color: `hsl(${Math.random() * 60 + 20}, 100%, 60%)`,
    });
  }
}

function endGame() {
  running = false;
  gameOverEl.style.display = 'block';
  if (score > best) {
    best = score;
    localStorage.setItem('snakeBest', best);
    bestEl.textContent = best;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // food
  const fx = food.x * GRID + GRID / 2;
  const fy = food.y * GRID + GRID / 2;
  const pulse = 1 + Math.sin(Date.now() / 200) * 0.2;
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(fx, fy, (GRID / 2 - 2) * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i) => {
    const px = s.x * GRID;
    const py = s.y * GRID;
    const t = i / Math.max(snake.length - 1, 1);
    const r = Math.round(lerp(100, 80, t));
    const g = Math.round(lerp(200, 220, t));
    const b = Math.round(lerp(255, 100, t));
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const pad = 1;
    ctx.fillRect(px + pad, py + pad, GRID - pad * 2, GRID - pad * 2);

    // eyes on head
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const ex = px + GRID / 2;
      const ey = py + GRID / 2;
      ctx.beginPath();
      const eyeR = 3;
      if (dir.x === 1) {
        ctx.arc(ex + 3, ey - 4, eyeR, 0, Math.PI * 2);
        ctx.arc(ex + 3, ey + 4, eyeR, 0, Math.PI * 2);
      } else if (dir.x === -1) {
        ctx.arc(ex - 3, ey - 4, eyeR, 0, Math.PI * 2);
        ctx.arc(ex - 3, ey + 4, eyeR, 0, Math.PI * 2);
      } else if (dir.y === -1) {
        ctx.arc(ex - 4, ey - 3, eyeR, 0, Math.PI * 2);
        ctx.arc(ex + 4, ey - 3, eyeR, 0, Math.PI * 2);
      } else {
        ctx.arc(ex - 4, ey + 3, eyeR, 0, Math.PI * 2);
        ctx.arc(ex + 4, ey + 3, eyeR, 0, Math.PI * 2);
      }
      ctx.fill();

      ctx.fillStyle = '#000';
      const pr = 1.5;
      if (dir.x === 1) {
        ctx.arc(ex + 4, ey - 4, pr, 0, Math.PI * 2);
        ctx.arc(ex + 4, ey + 4, pr, 0, Math.PI * 2);
      } else if (dir.x === -1) {
        ctx.arc(ex - 2, ey - 4, pr, 0, Math.PI * 2);
        ctx.arc(ex - 2, ey + 4, pr, 0, Math.PI * 2);
      } else if (dir.y === -1) {
        ctx.arc(ex - 4, ey - 2, pr, 0, Math.PI * 2);
        ctx.arc(ex + 4, ey - 2, pr, 0, Math.PI * 2);
      } else {
        ctx.arc(ex - 4, ey + 4, pr, 0, Math.PI * 2);
        ctx.arc(ex + 4, ey + 4, pr, 0, Math.PI * 2);
      }
      ctx.fill();
    }
  });

  // particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.04;
  });
  ctx.globalAlpha = 1;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function tick() {
  if (!running) return;
  update();
  draw();
}

function setDirection(dx, dy) {
  if (dir.x + dx === 0 && dir.y + dy === 0) return; // no reverse
  nextDir = { x: dx, y: dy };
}

// keyboard
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
  }
});

// touch buttons
document.querySelector('.btn-up').addEventListener('click', () => setDirection(0, -1));
document.querySelector('.btn-down').addEventListener('click', () => setDirection(0, 1));
document.querySelector('.btn-left').addEventListener('click', () => setDirection(-1, 0));
document.querySelector('.btn-right').addEventListener('click', () => setDirection(1, 0));

// swipe
let touchX = 0, touchY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDirection(dx > 0 ? 1 : -1, 0);
  } else {
    setDirection(0, dy > 0 ? 1 : -1);
  }
});

// restart
document.getElementById('btnReset').addEventListener('click', () => {
  clearInterval(gameLoop);
  init();
  draw();
  gameLoop = setInterval(tick, 120);
});

// start
init();
draw();
gameLoop = setInterval(tick, 120);
</script>
</body>
</html>
